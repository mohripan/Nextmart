apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexmart-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mohripan/Nexmart.git
    targetRevision: HEAD
    path: k8s/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true       # deletes resources removed from git
      selfHeal: true    # reverts manual kubectl changes